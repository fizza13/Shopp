<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Login - Mobile Shop Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🔐 Login</h1>

<div class="tab" style="max-width:420px;margin:0 auto;">
  <div id="loginMsg" style="text-align:center;font-weight:bold;margin-bottom:10px;"></div>

  <div class="form" style="justify-content:center;">
    <input id="username" placeholder="Username">
    <input id="password" placeholder="Password" type="password">
    <button onclick="login()">Login</button>
  </div>
</div>

<script>
  // If already logged in, go to app
  if (localStorage.getItem("loggedIn") === "true") {
    window.location.href = "index.html";
  }

  function login() {
    const u = document.getElementById("username").value.trim();
    const p = document.getElementById("password").value.trim();
    const msg = document.getElementById("loginMsg");

    if (u === "Shoaib" && p === "9422") {
      localStorage.setItem("loggedIn", "true");
      window.location.href = "index.html";
    } else {
      msg.style.color = "red";
      msg.innerText = "❌ Wrong username or password";
      setTimeout(() => msg.innerText = "", 2000);
    }
  }
</script>

</body>
</html>
